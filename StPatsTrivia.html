<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>St. Patrick's Day Trivia</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700;900&family=Lora:ital,wght@0,600;1,400&display=swap" rel="stylesheet">
<style>
  :root {
    --gold: #FFD700;
    --gold-dark: #B8860B;
    --gold-light: #FFF0A0;
    --green-deep: #1B5E20;
    --green-mid: #2E7D32;
    --green-bright: #4CAF50;
    --white: #FFFDF0;
  }
  html { zoom: 90%; }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Lora', Georgia, serif;
    background: var(--green-deep);
    min-height: 100vh;
    overflow: hidden;
    position: relative;
  }
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      radial-gradient(ellipse at 20% 20%, rgba(76,175,80,0.3) 0%, transparent 50%),
      radial-gradient(ellipse at 80% 80%, rgba(46,125,50,0.4) 0%, transparent 50%),
      radial-gradient(ellipse at 50% 50%, rgba(27,94,32,0.5) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }
  .shamrock-bg { position: fixed; inset: 0; pointer-events: none; z-index: 0; overflow: hidden; }
  .shamrock-bg span {
    position: absolute; font-size: 2rem; opacity: 0.08; animation: floatUp linear infinite;
  }
  @keyframes floatUp {
    0%   { transform: translateY(110vh) rotate(0deg);   opacity: 0; }
    10%  { opacity: 0.08; }
    90%  { opacity: 0.08; }
    100% { transform: translateY(-10vh) rotate(360deg); opacity: 0; }
  }

  /* SCREENS */
  .screen {
    position: fixed; inset: 0;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    z-index: 10;
    transition: opacity 0.5s ease, transform 0.5s ease;
  }
  .screen.hidden { opacity: 0; pointer-events: none; transform: scale(0.97); }

  /* TITLE */
  #title-screen { background: var(--green-deep); }
  .title-bg-img { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; }
  .title-overlay {
    position: relative; z-index: 2;
    display: flex; flex-direction: column; align-items: center; justify-content: flex-end;
    height: 100%; width: 100%; padding-bottom: 60px;
    background: linear-gradient(to top, rgba(0,0,0,0.6) 0%, transparent 40%);
  }
  .start-btn {
    background: linear-gradient(135deg, var(--gold) 0%, #FFF0A0 40%, var(--gold) 70%, var(--gold-dark) 100%);
    color: var(--green-deep); border: 4px solid var(--gold-dark);
    padding: 18px 60px; font-family: 'Cinzel Decorative', serif;
    font-size: 1.4rem; font-weight: 700; cursor: pointer; border-radius: 50px;
    letter-spacing: 3px;
    box-shadow: 0 0 30px rgba(255,215,0,0.7), 0 6px 20px rgba(0,0,0,0.5), inset 0 2px 4px rgba(255,255,255,0.5);
    transition: all 0.2s ease; animation: pulse-gold 2s ease-in-out infinite;
  }
  .start-btn:hover { transform: scale(1.06) translateY(-3px); box-shadow: 0 0 50px rgba(255,215,0,0.9), 0 10px 30px rgba(0,0,0,0.6); }
  @keyframes pulse-gold {
    0%, 100% { box-shadow: 0 0 20px rgba(255,215,0,0.6), 0 6px 20px rgba(0,0,0,0.5); }
    50%       { box-shadow: 0 0 45px rgba(255,215,0,0.9), 0 6px 20px rgba(0,0,0,0.5); }
  }

  /* QUESTION SCREEN */
  #question-screen { padding: 20px; overflow-y: auto; justify-content: flex-start; padding-top: 20px; }
  .question-container { width: 100%; max-width: 820px; position: relative; z-index: 10; padding-bottom: 20px; }

  .progress-bar { display: flex; align-items: center; justify-content: center; gap: 8px; margin-bottom: 16px; }
  .progress-dot {
    width: 12px; height: 12px; border-radius: 50%;
    background: rgba(255,215,0,0.3); border: 2px solid var(--gold); transition: all 0.3s ease;
  }
  .progress-dot.active { background: var(--gold); box-shadow: 0 0 10px var(--gold); transform: scale(1.3); }
  .progress-dot.done  { background: var(--gold-dark); border-color: var(--gold-dark); }

  .q-counter {
    text-align: center; font-family: 'Cinzel Decorative', serif;
    color: var(--gold); font-size: 0.85rem; letter-spacing: 3px;
    text-shadow: 0 0 10px rgba(255,215,0,0.5); margin-bottom: 8px; text-transform: uppercase;
  }

  /* CARD FLIP — the scene has a fixed height; both faces are absolutely positioned */
  .card-scene { perspective: 1200px; width: 100%; }
  .card {
    width: 100%; position: relative;
    transform-style: preserve-3d;
    transition: transform 0.7s cubic-bezier(0.4, 0, 0.2, 1);
  }
  .card.flipped { transform: rotateY(180deg); }

  .card-face {
    backface-visibility: hidden;
    border-radius: 20px; padding: 30px 36px;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    width: 100%;
  }
  /* Front sits in normal flow to set the scene height */
  .card-front {
    position: relative;
    background: linear-gradient(160deg, #1a6b1a 0%, #145214 40%, #0d3d0d 100%);
    box-shadow: 0 0 0 5px var(--gold), 0 0 0 8px var(--gold-dark),
                0 0 40px rgba(255,215,0,0.3), inset 0 0 60px rgba(0,0,0,0.3), 0 20px 60px rgba(0,0,0,0.6);
    overflow: hidden;
  }
  .card-front::before {
    content: ''; position: absolute; inset: 0;
    background: repeating-linear-gradient(45deg, transparent, transparent 40px, rgba(255,215,0,0.02) 40px, rgba(255,215,0,0.02) 41px);
    pointer-events: none;
  }
  .card-front::after { content: '🍀'; position: absolute; top: 10px; right: 14px; font-size: 1.4rem; opacity: 0.5; }

  /* Back is absolutely positioned over the front, rotated 180° */
  .card-back {
    position: absolute; top: 0; left: 0; height: 100%;
    transform: rotateY(180deg);
    background: linear-gradient(160deg, #0d3d0d 0%, #1a5c1a 60%, #0a2e0a 100%);
    box-shadow: 0 0 0 5px var(--gold), 0 0 0 8px var(--gold-dark),
                0 0 40px rgba(255,215,0,0.4), inset 0 0 60px rgba(0,0,0,0.2), 0 20px 60px rgba(0,0,0,0.6);
    overflow: hidden;
  }

  .type-badge {
    display: inline-block; padding: 4px 18px; border-radius: 20px;
    font-size: 0.7rem; font-weight: 700; letter-spacing: 3px; text-transform: uppercase;
    margin-bottom: 16px; font-family: 'Cinzel Decorative', serif;
  }
  .badge-tf  { background: linear-gradient(90deg, var(--gold-dark), var(--gold)); color: var(--green-deep); box-shadow: 0 0 15px rgba(255,215,0,0.5); }
  .badge-mc  { background: linear-gradient(90deg, #1a5c1a, #2d8a2d); color: var(--gold); border: 2px solid var(--gold); box-shadow: 0 0 15px rgba(255,215,0,0.3); }

  .q-text { color: var(--white); font-size: 1.25rem; line-height: 1.6; text-align: center; text-shadow: 0 2px 8px rgba(0,0,0,0.5); margin-bottom: 20px; }

  .tf-buttons { display: flex; gap: 20px; margin-top: 10px; }
  .tf-btn {
    padding: 14px 44px; font-family: 'Cinzel Decorative', serif; font-size: 1.1rem; font-weight: 700;
    border: 3px solid var(--gold); border-radius: 12px; cursor: pointer; transition: all 0.2s;
    letter-spacing: 2px; color: var(--gold); background: rgba(255,215,0,0.08);
  }
  .tf-btn:hover { background: rgba(255,215,0,0.2); transform: translateY(-3px); box-shadow: 0 6px 20px rgba(255,215,0,0.3); }

  .mc-options { display: flex; flex-direction: column; gap: 10px; width: 100%; margin-top: 10px; }
  .mc-opt {
    display: flex; align-items: center; gap: 14px; padding: 12px 20px;
    background: rgba(255,215,0,0.07); border: 2px solid rgba(255,215,0,0.35);
    border-radius: 10px; cursor: pointer; transition: all 0.2s;
    color: var(--white); font-size: 0.95rem; text-align: left;
  }
  .mc-opt:hover { background: rgba(255,215,0,0.18); border-color: var(--gold); transform: translateX(6px); }
  .opt-letter { font-family: 'Cinzel Decorative', serif; color: var(--gold); font-size: 0.9rem; font-weight: 700; min-width: 22px; }

  /* ANSWER side */
  .answer-label { font-family: 'Cinzel Decorative', serif; color: var(--gold); font-size: 0.75rem; letter-spacing: 4px; text-transform: uppercase; margin-bottom: 8px; opacity: 0.8; }
  .answer-text { font-size: 1.4rem; font-weight: 700; color: var(--gold-light); text-align: center; font-family: 'Cinzel Decorative', serif; text-shadow: 0 0 20px rgba(255,215,0,0.6); margin-bottom: 8px; }
  .answer-explanation { color: rgba(255,253,240,0.85); font-size: 0.95rem; text-align: center; line-height: 1.6; font-style: italic; max-width: 580px; }
  .answer-image { width: 160px; height: 160px; object-fit: cover; border-radius: 16px; border: 4px solid var(--gold); box-shadow: 0 0 30px rgba(255,215,0,0.5); margin: 10px auto; display: block; }

  .divider { display: flex; align-items: center; gap: 12px; margin: 10px 0; color: var(--gold); font-size: 1.2rem; opacity: 0.7; }
  .divider::before, .divider::after { content: ''; flex: 1; height: 1px; background: linear-gradient(90deg, transparent, var(--gold), transparent); }

  .reveal-hint { text-align: center; margin-top: 12px; color: rgba(255,215,0,0.6); font-size: 0.8rem; letter-spacing: 2px; animation: blink 1.8s ease-in-out infinite; font-family: 'Cinzel Decorative', serif; }
  @keyframes blink { 0%, 100% { opacity: 0.5; } 50% { opacity: 1; } }

  .nav-row { display: flex; justify-content: center; align-items: center; gap: 20px; margin-top: 16px; position: relative; z-index: 10; }
  .nav-btn { padding: 12px 36px; font-family: 'Cinzel Decorative', serif; font-size: 0.85rem; font-weight: 700; letter-spacing: 2px; border-radius: 40px; cursor: pointer; transition: all 0.2s; text-transform: uppercase; }
  .nav-btn-prev { background: transparent; border: 2px solid rgba(255,215,0,0.5); color: rgba(255,215,0,0.7); }
  .nav-btn-prev:hover { border-color: var(--gold); color: var(--gold); background: rgba(255,215,0,0.1); }
  .nav-btn-next { background: linear-gradient(135deg, var(--gold) 0%, var(--gold-dark) 100%); border: 3px solid var(--gold-dark); color: var(--green-deep); box-shadow: 0 4px 20px rgba(255,215,0,0.4); }
  .nav-btn-next:hover { transform: translateY(-2px); box-shadow: 0 8px 28px rgba(255,215,0,0.6); }

  /* END SCREEN */
  #end-screen { background: var(--green-deep); }
  .end-card { background: linear-gradient(160deg, #1a6b1a, #0d3d0d); border: 6px solid var(--gold); box-shadow: 0 0 60px rgba(255,215,0,0.4), 0 0 0 10px rgba(255,215,0,0.1); border-radius: 24px; padding: 50px 60px; text-align: center; max-width: 600px; }
  .end-emoji { font-size: 4rem; margin-bottom: 16px; display: block; }
  .end-title { font-family: 'Cinzel Decorative', serif; color: var(--gold); font-size: 1.8rem; text-shadow: 0 0 30px rgba(255,215,0,0.6); margin-bottom: 16px; }
  .end-text { color: var(--white); font-size: 1rem; line-height: 1.8; margin-bottom: 30px; opacity: 0.9; }
  .play-again-btn { background: linear-gradient(135deg, var(--gold), var(--gold-dark)); color: var(--green-deep); border: 3px solid var(--gold-dark); padding: 14px 48px; font-family: 'Cinzel Decorative', serif; font-size: 1rem; font-weight: 700; border-radius: 40px; cursor: pointer; letter-spacing: 2px; box-shadow: 0 4px 24px rgba(255,215,0,0.4); transition: all 0.2s; }
  .play-again-btn:hover { transform: scale(1.05); box-shadow: 0 8px 32px rgba(255,215,0,0.6); }

  .corner-shamrock { position: fixed; font-size: 1.2rem; opacity: 0.6; z-index: 5; }
  .tl { top: 14px; left: 14px; } .tr { top: 14px; right: 14px; }
  .bl { bottom: 14px; left: 14px; } .br { bottom: 14px; right: 14px; }

  @keyframes coinBurst {
    0%   { transform: translateY(0) scale(0); opacity: 1; }
    100% { transform: translateY(-80px) scale(1); opacity: 0; }
  }
  .coin-burst { position: absolute; font-size: 1.5rem; animation: coinBurst 0.8s ease-out forwards; pointer-events: none; z-index: 100; }
</style>
</head>
<body>

<div class="shamrock-bg" id="shamrockBg"></div>
<span class="corner-shamrock tl">🍀</span>
<span class="corner-shamrock tr">☘️</span>
<span class="corner-shamrock bl">☘️</span>
<span class="corner-shamrock br">🍀</span>

<!-- TITLE SCREEN -->
<div class="screen" id="title-screen">
  <img class="title-bg-img" id="titleImg" alt="St. Patrick's Day Trivia" />
  <div class="title-overlay">
    <button class="start-btn" onclick="startGame()">🍀 Let's Play! 🍀</button>
  </div>
</div>

<!-- QUESTION SCREEN -->
<div class="screen hidden" id="question-screen">
  <div class="question-container">
    <div class="q-counter" id="qCounter">Question 1 of 10</div>
    <div class="progress-bar" id="progressBar"></div>
    <div class="card-scene" id="cardScene">
      <div class="card" id="mainCard">
        <div class="card-face card-front" id="cardFront"></div>
        <div class="card-face card-back" id="cardBack"></div>
      </div>
    </div>
    <div class="reveal-hint" id="revealHint">✦ Click the card to reveal the answer ✦</div>
    <div class="nav-row">
      <button class="nav-btn nav-btn-prev" id="prevBtn" onclick="prevQuestion()">← Back</button>
      <button class="nav-btn nav-btn-next" id="nextBtn" onclick="nextQuestion()">Next →</button>
    </div>
  </div>
</div>

<!-- END SCREEN -->
<div class="screen hidden" id="end-screen">
  <div class="end-card">
    <span class="end-emoji">🏆</span>
    <div class="end-title">Top o' the Mornin'!</div>
    <div class="end-text">You've reached the end of the trivia!<br>May your day be as lucky as a four-leaf clover<br>and as golden as a leprechaun's pot! 🌈</div>
    <button class="play-again-btn" onclick="restartGame()">🍀 Play Again 🍀</button>
  </div>
</div>

  { type:'tf', question:'St. Patrick was Irish.', answer:'FALSE', explanation:'St. Patrick was actually born in Roman Britain — modern-day Scotland or Wales — around 385 AD. He was brought to Ireland as a slave before eventually returning as a missionary.', image:null, emoji:'☘️' },

let currentQ = 0;
let isFlipped  = false;

function getImgSrc(key) {
  if (key === 'greenpee')   return 'data:image/jpeg;base64,' + IMG_GREENPEE;
  if (key === 'leprechaun') return 'data:image/jpeg;base64,' + IMG_LEPRECHAUN;
  return null;
}

function buildShamrocks() {
  const container = document.getElementById('shamrockBg');
  const emojis = ['🍀','☘️','🌟','💛','🌈','🍀','☘️','🍀'];
  for (let i = 0; i < 20; i++) {
    const span = document.createElement('span');
    span.textContent = emojis[i % emojis.length];
    span.style.left = (Math.random() * 100) + '%';
    span.style.animationDuration = (8 + Math.random() * 12) + 's';
    span.style.animationDelay = (Math.random() * 10) + 's';
    span.style.fontSize = (1.2 + Math.random() * 2) + 'rem';
    container.appendChild(span);
  }
}

function buildProgressBar() {
  const bar = document.getElementById('progressBar');
  bar.innerHTML = '';
  questions.forEach((_, i) => {
    const dot = document.createElement('div');
    dot.className = 'progress-dot' + (i === currentQ ? ' active' : i < currentQ ? ' done' : '');
    bar.appendChild(dot);
  });
}

function syncCardHeight() {
  // Let the front (in-flow) set natural height, then force back to match
  const front = document.getElementById('cardFront');
  const back  = document.getElementById('cardBack');
  // Reset first
  back.style.height = '';
  // Allow a frame to paint, then match
  requestAnimationFrame(() => {
    const h = front.offsetHeight;
    back.style.height = h + 'px';
  });
}

function expandForAnswer() {
  // After flip, resize card to fit back content
  const front = document.getElementById('cardFront');
  const back  = document.getElementById('cardBack');
  const card  = document.getElementById('mainCard');

  // Temporarily allow overflow measurement on back
  back.style.height = 'auto';
  back.style.overflow = 'visible';

  requestAnimationFrame(() => {
    const backH = back.scrollHeight + 20; // small padding buffer
    const frontH = front.offsetHeight;
    const newH = Math.max(backH, frontH);

    // Apply to both faces so the card holds the right height
    front.style.height = newH + 'px';
    back.style.height  = newH + 'px';
    back.style.overflow = '';
    card.style.height = newH + 'px';

    document.getElementById('question-screen').scrollTo({ top: 9999, behavior: 'smooth' });
  });
}

function renderQuestion() {
  const q = questions[currentQ];
  const card  = document.getElementById('mainCard');
  const front = document.getElementById('cardFront');
  const back  = document.getElementById('cardBack');

  // Full reset
  card.classList.remove('flipped');
  card.style.height  = '';
  front.style.height = '';
  back.style.height  = '';
  back.style.overflow = '';
  isFlipped = false;

  document.getElementById('revealHint').style.display = 'block';
  document.getElementById('qCounter').textContent = `Question ${currentQ + 1} of ${questions.length}`;
  buildProgressBar();
  document.getElementById('prevBtn').style.display = currentQ === 0 ? 'none' : 'inline-block';
  document.getElementById('nextBtn').textContent = currentQ === questions.length - 1 ? 'Finish 🏆' : 'Next →';

  // ---- FRONT ----
  if (q.type === 'tf') {
    front.innerHTML = `
      <span class="type-badge badge-tf">True or False</span>
      <p class="q-text">${q.question}</p>
      <div class="tf-buttons">
        <button class="tf-btn" onclick="flipCard()">True</button>
        <button class="tf-btn" onclick="flipCard()">False</button>
      </div>`;
  } else {
    const letters = ['A','B','C','D'];
    const opts = q.options.map((o,i) => `
      <div class="mc-opt" onclick="flipCard()">
        <span class="opt-letter">${letters[i]}.</span><span>${o}</span>
      </div>`).join('');
    front.innerHTML = `
      <span class="type-badge badge-mc">Multiple Choice</span>
      <p class="q-text">${q.question}</p>
      <div class="mc-options">${opts}</div>`;
  }

  // ---- BACK ----
  let mediaHTML = '';
  if (q.image) {
    const src = getImgSrc(q.image);
    if (src) mediaHTML = `<img class="answer-image" src="${src}" alt="answer" />`;
  } else if (q.emoji) {
    mediaHTML = `<div style="font-size:3rem;margin:8px 0;">${q.emoji}</div>`;
  }
  const ansText = q.type === 'tf' ? q.answer : `${q.answer} — ${q.answerText}`;
  back.innerHTML = `
    <div class="answer-label">✦ Answer ✦</div>
    <div class="answer-text">${ansText}</div>
    <div class="divider">🍀</div>
    ${mediaHTML}
    <p class="answer-explanation">${q.explanation}</p>`;

  // After paint, sync back height to front height
  requestAnimationFrame(() => syncCardHeight());

  card.onclick = () => flipCard();
}

function flipCard() {
  if (isFlipped) return;
  isFlipped = true;
  document.getElementById('mainCard').classList.add('flipped');
  document.getElementById('revealHint').style.display = 'none';
  // Wait for flip animation, then expand card to fit answer content
  setTimeout(() => expandForAnswer(), 750);
  burstCoins();
}

function burstCoins() {
  const container = document.getElementById('question-screen');
  const coins = ['🪙','⭐','✨','🍀','💛'];
  for (let i = 0; i < 6; i++) {
    const coin = document.createElement('span');
    coin.className = 'coin-burst';
    coin.textContent = coins[Math.floor(Math.random() * coins.length)];
    coin.style.left = (30 + Math.random() * 40) + '%';
    coin.style.top = '50%';
    coin.style.animationDelay = (i * 0.08) + 's';
    container.appendChild(coin);
    setTimeout(() => coin.remove(), 1000);
  }
}

function nextQuestion() {
  if (currentQ < questions.length - 1) { currentQ++; renderQuestion(); }
  else showEnd();
}
function prevQuestion() {
  if (currentQ > 0) { currentQ--; renderQuestion(); }
}
function startGame() {
  document.getElementById('title-screen').classList.add('hidden');
  document.getElementById('question-screen').classList.remove('hidden');
  currentQ = 0;
  renderQuestion();
}
function showEnd() {
  document.getElementById('question-screen').classList.add('hidden');
  document.getElementById('end-screen').classList.remove('hidden');
}
function restartGame() {
  document.getElementById('end-screen').classList.add('hidden');
  currentQ = 0;
  renderQuestion();
  document.getElementById('question-screen').classList.remove('hidden');
}
